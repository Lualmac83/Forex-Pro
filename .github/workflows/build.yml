name: Compilar APK de Forex

on:
  push:
    branches: [ main, principal, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceptar licencias SDK
        run: yes | sdkmanager --licenses || true

      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git zip unzip python3-dev libffi-dev libssl-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev autoconf libtool pkg-config

      - name: Instalar Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.37

      - name: Compilar APK
        run: buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: '0'

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexSignalsPRO
          path: bin/*.apk
          retention-days: 30
