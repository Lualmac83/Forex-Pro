name: Compilar APK de Forex

on:
  push:
    branches: [ main, principal, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git zip unzip python3-dev libffi-dev libssl-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev autoconf libtool pkg-config

      - name: Instalar Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.37

      - name: Aceptar licencias SDK
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: Compilar APK
        run: buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: '0'

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ForexSignalsPRO
          path: bin/*.apk
          retention-days: 30
